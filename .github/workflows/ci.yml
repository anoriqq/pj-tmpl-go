name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      cicd: ${{ steps.filter.outputs.cicd }}
      force: ${{ steps.filter.outputs.force }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - '**/go.work'
              - '**/go.work.sum'
              - '**/testdata/**'
            cicd:
              - '.github/workflows/**'
              - '.github/actions/**'
            force:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'mise.toml'

  go-lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4.2.3
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - name: Lint
        shell: bash
        run: mise run lint:go

  go-build:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4.2.3
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - run: go mod download
      - name: Build
        shell: bash
        env:
          RELEASE: 1
        run: mise run build

  go-test:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4.2.3
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - run: go mod download
      - name: Test
        shell: bash
        run: mise run test

  infra:
    needs: changes
    if: ${{ needs.changes.outputs.cicd == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@9e7f7633ff6f6d6048a9418a68d48f288f50eb14 # v4.2.3
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - run: mise run lint:gha
