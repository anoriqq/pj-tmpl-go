name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      cicd: ${{ steps.filter.outputs.cicd }}
      force: ${{ steps.filter.outputs.force }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - '**/go.work'
              - '**/go.work.sum'
              - '**/testdata/**'
            cicd:
              - '.github/workflows/**'
              - '.github/actions/**'
            force:
              - '.github/workflows/**'
              - '.github/actions/**'
              - 'mise.toml'

  go-lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - name: Lint
        shell: bash
        run: mise run lint:go

  go-build:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - run: go mod download
      - name: Build
        shell: bash
        env:
          RELEASE: 1
        run: mise run build

  go-test:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - run: go mod download
      - name: Test
        shell: bash
        run: mise run test

  infra:
    needs: changes
    if: ${{ needs.changes.outputs.cicd == 'true' || needs.changes.outputs.force == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ vars.MISE_VERSION }}
          experimental: true
      - run: mise run lint:gha
